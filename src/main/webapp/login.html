<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ocean View Resort</title>

  <!-- Link Global CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Page Specific Styles for Login -->
  <style>
    body {
      background-color: var(--bg-light);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .auth-container {
      width: 100%;
      max-width: 450px;
      margin: 0 auto;
    }

    .auth-header {
      text-align: center;
      padding: 2rem;
      background: rgba(19, 182, 236, 0.1); /* Primary light */
      border-bottom: 1px solid var(--border-color);
    }

    .auth-icon {
      width: 50px;
      height: 50px;
      background-color: var(--secondary);
      color: white;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem auto;
      font-size: 2rem;
      box-shadow: var(--shadow-md);
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.25rem;
      user-select: none;
    }

    .check-icon {
      position: absolute;
      right: 40px; /* To left of eye icon if present */
      top: 50%;
      transform: translateY(-50%);
      color: var(--success);
      display: none; /* Toggled by JS */
      font-size: 1.25rem;
    }

    .validation-msg {
      font-size: 0.75rem;
      color: var(--error);
      margin-top: 0.25rem;
      display: none; /* Toggled by JS */
    }

    .help-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    .help-link:hover { color: var(--secondary); }
  </style>
</head>
<body>

<div class="card auth-container" style="padding: 0;">

  <!-- Header -->
  <div class="auth-header">
    <div class="auth-icon">
      <span class="material-symbols-outlined">water_lux</span>
    </div>
    <h2>Welcome Back</h2>
    <p class="text-muted text-sm">Access your Ocean View dashboard</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button id="tab-login" class="tab-btn tab-active" onclick="switchTab('login')">Sign In</button>
    <button id="tab-register" class="tab-btn tab-inactive" onclick="switchTab('register')">Create Account</button>
  </div>

  <!-- Login Form -->
  <form id="login-form" style="padding: 2rem;" novalidate>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="login-username" class="form-input" placeholder="Enter your username">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrapper">
        <input type="password" id="login-password" class="form-input" placeholder="••••••••">
        <span class="material-symbols-outlined input-icon" onclick="togglePassword('login-password', this)">visibility</span>
      </div>
    </div>

    <button type="submit" class="btn btn-primary" style="width: 100%;">
      <span>Sign In</span>
      <span class="material-symbols-outlined">login</span>
    </button>

    <div id="login-error" class="alert alert-error hidden mt-4 text-center"></div>
  </form>

  <!-- Register Form (Hidden by default) -->
  <form id="register-form" class="hidden" style="padding: 2rem;" novalidate>

    <!-- Username (Email Format) -->
    <div class="form-group">
      <label class="form-label">Email Address (Username)</label>
      <div class="input-wrapper">
        <input type="email" id="reg-username" class="form-input" placeholder="user@domain.com" maxlength="64">
        <span class="material-symbols-outlined check-icon">check_circle</span>
      </div>
      <div class="validation-msg">Please enter a valid email address.</div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrapper">
        <input type="password" id="reg-password" class="form-input" placeholder="8+ chars, upper, lower, special" maxlength="32">
        <span class="material-symbols-outlined input-icon" onclick="togglePassword('reg-password', this)">visibility</span>
        <span class="material-symbols-outlined check-icon" style="right: 40px;">check_circle</span>
      </div>
      <div class="validation-msg">Must be 8+ chars, contain A-Z, a-z, 0-9, and special char.</div>
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <div class="input-wrapper">
        <input type="password" id="reg-confirm" class="form-input" placeholder="Re-type password" maxlength="32">
        <span class="material-symbols-outlined check-icon">check_circle</span>
      </div>
      <div class="validation-msg">Passwords do not match.</div>
    </div>

    <button type="submit" class="btn btn-secondary" style="width: 100%;">
      <span>Create Account</span>
      <span class="material-symbols-outlined">person_add</span>
    </button>

    <div id="reg-error" class="alert alert-error hidden mt-4 text-center"></div>
    <div id="reg-success" class="alert alert-success hidden mt-4 text-center"></div>
  </form>

  <a href="help.html" class="help-link" style="margin-bottom: 2rem;">
    <span class="material-symbols-outlined" style="font-size: 1.25rem;">help</span> Need help? Visit our Help Center
  </a>
</div>

<!-- Link Auth JS -->
<script src="js/auth.js"></script>

</body>
</html>
