<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Staff - Admin Panel</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 2rem;
    }
    @media (max-width: 900px) {
      .admin-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-content">
    <div class="logo-group">
      <span class="material-symbols-outlined" style="font-size: 2rem;">admin_panel_settings</span>
      <h2>Admin Console</h2>
    </div>
    <a href="dashboard.html" style="display: flex; align-items: center; gap: 0.5rem; font-weight: 700; color: var(--text-muted);">
      <span class="material-symbols-outlined">arrow_back</span> Back to Dashboard
    </a>
  </div>
</header>

<div class="container">
  <div class="admin-grid">

    <!-- Create Staff Form -->
    <div>
      <div class="card">
        <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
          <span class="material-symbols-outlined" style="color: var(--secondary);">person_add</span> Register Staff
        </h3>

        <form id="staff-form">
          <div class="form-group">
            <label class="form-label">Staff Username / Email</label>
            <input type="text" id="staffUser" required class="form-input" placeholder="staff@oceanview.com">
          </div>

          <div class="form-group">
            <label class="form-label">Temporary Password</label>
            <input type="password" id="staffPass" required class="form-input" placeholder="••••••••">
          </div>

          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" id="staffPassConfirm" required class="form-input" placeholder="••••••••">
          </div>

          <div id="form-msg" class="alert hidden"></div>

          <button type="submit" class="btn btn-primary" style="width: 100%;">
            Create Staff Account
          </button>
        </form>
      </div>
    </div>

    <!-- Staff List Table -->
    <div>
      <div class="card" style="padding: 0; overflow: hidden;">
        <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background-color: var(--bg-light);">
          <h3 style="display: flex; align-items: center; gap: 0.5rem;">
            <span class="material-symbols-outlined" style="color: var(--secondary);">badge</span> Active Staff
          </h3>
          <button onclick="loadStaff()" class="btn btn-secondary" style="background: transparent; color: var(--text-muted); box-shadow: none; padding: 0.5rem;">
            <span class="material-symbols-outlined">refresh</span> Refresh
          </button>
        </div>

        <div class="table-container" style="border: none; box-shadow: none;">
          <table class="table">
            <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Role</th>
              <th class="text-right">Action</th>
            </tr>
            </thead>
            <tbody id="staff-table-body">
            <tr><td colspan="4" class="text-center text-muted" style="padding: 2rem;">Loading staff...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="js/staff.js"></script>
</body>
</html>
