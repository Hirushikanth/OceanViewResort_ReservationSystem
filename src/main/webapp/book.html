<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Room - Ocean View Resort</title>

  <!-- Link Global CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Page Specific Styles -->
  <style>
    .booking-card {
      max-width: 800px;
      margin: 0 auto;
      padding: 0; /* Override default card padding to allow full-width header */
      overflow: hidden;
    }

    .booking-header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      padding: 2rem;
      color: white;
      position: relative;
    }

    .booking-header h1 {
      color: white; /* Override default h1 color */
      margin-bottom: 0.5rem;
    }

    .booking-header p {
      opacity: 0.9;
      font-size: 0.875rem;
    }

    .form-section {
      padding: 2rem;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
    }

    /* Grid Layout for Inputs */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 640px) {
      .grid-2 {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-content">
    <div class="logo-group" onclick="window.location.href='index.html'">
      <div class="logo-icon">
        <span class="material-symbols-outlined">water_lux</span>
      </div>
      <h2>Ocean View Resort</h2>
    </div>
    <div style="display: flex; align-items: center; gap: 1.5rem;">
      <a href="dashboard.html" style="font-size: 0.875rem; font-weight: 700; color: var(--text-muted);">My Dashboard</a>
      <button id="logoutBtn" style="background: none; border: none; color: var(--error); font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 0.25rem; font-size: 0.875rem;">
        <span class="material-symbols-outlined" style="font-size: 1.25rem;">logout</span> Logout
      </button>
    </div>
  </div>
</header>

<!-- Main Content -->
<div class="container">

  <div class="card booking-card">

    <!-- Banner -->
    <div class="booking-header">
      <h1>Make a Reservation</h1>
      <p>Fill in your details to secure your stay in paradise.</p>
    </div>

    <!-- Form -->
    <form id="booking-form" class="form-section">

      <!-- Guest Details -->
      <div class="section-title">
        <span class="material-symbols-outlined">person</span> Guest Information
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="guestName" required class="form-input" placeholder="e.g. John Doe">
        </div>
        <div class="form-group">
          <label class="form-label">Contact Number</label>
          <input type="tel" id="contactNumber" required class="form-input" placeholder="e.g. 077 123 4567">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Billing Address</label>
        <textarea id="address" required rows="2" class="form-input" placeholder="e.g. 123 Beach Road, Galle" style="resize: vertical; min-height: 80px;"></textarea>
      </div>

      <!-- Room & Dates -->
      <div class="section-title" style="margin-top: 2rem;">
        <span class="material-symbols-outlined">bed</span> Stay Details
      </div>

      <div class="form-group">
        <label class="form-label">Room Type</label>
        <!-- DYNAMIC DROPDOWN POPULATED BY app.js -->
        <select id="requestedType" required class="form-input">
          <option value="" disabled selected>Loading room types...</option>
        </select>
        <p class="text-muted" style="font-size: 0.75rem; margin-top: 0.25rem;">Prices are per night.</p>
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Check-In Date</label>
          <input type="date" id="checkInDate" required class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Check-Out Date</label>
          <input type="date" id="checkOutDate" required class="form-input">
        </div>
      </div>

      <!-- Error/Success Messages -->
      <div id="form-error" class="alert alert-error hidden text-center"></div>
      <div id="form-success" class="alert alert-success hidden text-center"></div>

      <!-- Submit -->
      <div style="margin-top: 2rem;">
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">
          <span>Request Booking</span>
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
        <p class="text-muted text-center" style="font-size: 0.75rem; margin-top: 1rem;">You won't be charged until confirmation.</p>
      </div>
    </form>
  </div>
</div>

<!-- Footer -->
<div class="text-center text-muted text-sm" style="padding: 2rem;">
  &copy; 2026 Ocean View Resort. All rights reserved.
</div>

<script src="js/app.js"></script>
</body>
</html>
