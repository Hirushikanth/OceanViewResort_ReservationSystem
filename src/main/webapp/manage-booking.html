<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Booking - Ocean View Resort</title>

    <!-- Link Global CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Page Specific Styles -->
    <style>
        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .booking-details-card {
            position: sticky;
            top: 5rem;
        }

        .detail-item {
            margin-bottom: 1.5rem;
        }

        .detail-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .detail-value {
            font-weight: 700;
            color: var(--text-dark);
            font-size: 1.1rem;
        }

        .floor-section {
            background-color: var(--bg-light);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
        }

        .floor-label {
            min-width: 80px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            font-size: 0.875rem;
            text-align: right;
            padding-top: 1rem;
        }

        .room-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            flex: 1;
        }

        @media (max-width: 768px) {
            .layout-grid {
                grid-template-columns: 1fr;
            }
            .floor-section {
                flex-direction: column;
                gap: 0.5rem;
            }
            .floor-label {
                text-align: left;
                padding-top: 0;
            }
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-content">
        <div class="logo-group">
            <span class="material-symbols-outlined" style="font-size: 2rem;">assignment_turned_in</span>
            <h2>Manage Booking</h2>
        </div>
        <a href="dashboard.html" style="display: flex; align-items: center; gap: 0.5rem; font-weight: 700; color: var(--text-muted);">
            <span class="material-symbols-outlined">arrow_back</span> Back to Dashboard
        </a>
    </div>
</header>

<div class="container">
    <div class="layout-grid">

        <!-- Left Column: Booking Details -->
        <div class="booking-details-card">
            <div class="card">
                <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">Guest Details</h3>

                <div class="detail-item">
                    <div class="detail-label">Guest Name</div>
                    <div class="detail-value" id="b-guest-name">Loading...</div>
                </div>

                <div class="detail-item">
                    <div class="detail-label">Contact Number</div>
                    <div class="detail-value" style="font-size: 1rem;" id="b-contact">...</div>
                </div>

                <div class="detail-item">
                    <div class="detail-label">Requested Room Type</div>
                    <span class="badge badge-pending" style="font-size: 0.875rem; margin-top: 0.5rem;" id="b-type">...</span>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                    <div>
                        <div class="detail-label">Check-In</div>
                        <div class="detail-value" style="font-size: 1rem;" id="b-checkin">...</div>
                    </div>
                    <div>
                        <div class="detail-label">Check-Out</div>
                        <div class="detail-value" style="font-size: 1rem;" id="b-checkout">...</div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="card" style="margin-top: 1.5rem;">
                <h3 style="margin-bottom: 1rem;">Actions</h3>

                <div id="action-error" class="alert alert-error hidden"></div>

                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <button id="btn-confirm" onclick="confirmBooking()" class="btn btn-primary" style="background-color: var(--success); width: 100%;">
                        <span class="material-symbols-outlined">check_circle</span> Confirm Booking
                    </button>
                    <button onclick="rejectBooking()" class="btn btn-danger" style="width: 100%;">
                        <span class="material-symbols-outlined">cancel</span> Reject & Cancel
                    </button>
                </div>
            </div>
        </div>

        <!-- Right Column: Room Selection -->
        <div class="card">
            <div style="border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1.5rem;">
                <h3>Select a room</h3>
                <p class="text-muted" style="font-size: 0.875rem; margin-top: 0.5rem;">
                    Showing all <strong id="display-type" style="color: var(--secondary);">...</strong> rooms.
                </p>
            </div>

            <!-- Dynamic Floor Plan Container -->
            <div id="floor-plan-container">
                <div class="text-center text-muted" style="padding: 3rem;">Loading floor plan...</div>
            </div>
        </div>

    </div>
</div>

<script src="js/manage-booking.js"></script>
</body>
</html>
