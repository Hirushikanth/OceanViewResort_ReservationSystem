<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Rooms - Admin Panel</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 2rem;
    }
    @media (max-width: 900px) {
      .admin-grid { grid-template-columns: 1fr; }
    }
    .sticky-form {
      position: sticky;
      top: 6rem;
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-content">
    <div class="logo-group">
      <span class="material-symbols-outlined" style="font-size: 2rem;">bedroom_parent</span>
      <h2>Room Inventory</h2>
    </div>
    <a href="dashboard.html" style="display: flex; align-items: center; gap: 0.5rem; font-weight: 700; color: var(--text-muted);">
      <span class="material-symbols-outlined">arrow_back</span> Back to Dashboard
    </a>
  </div>
</header>

<div class="container">
  <div class="admin-grid">

    <!-- Add Room Form -->
    <div class="sticky-form">
      <div class="card">
        <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
          <span class="material-symbols-outlined" style="color: var(--secondary);">add_circle</span> Add New Room
        </h3>

        <form id="room-form">
          <div class="form-group">
            <label class="form-label">Room Number</label>
            <input type="text" id="roomNumber" required class="form-input" placeholder="e.g. 101, 305A">
          </div>

          <div class="form-group">
            <label class="form-label">Room Type</label>
            <input type="text" id="roomType" list="roomTypesList" required class="form-input" placeholder="e.g. Oceanfront Villa">
            <datalist id="roomTypesList">
              <option value="Oceanfront Villa"></option>
              <option value="Garden Suite"></option>
              <option value="Penthouse Retreat"></option>
              <option value="Deluxe Room"></option>
              <option value="Standard Room"></option>
            </datalist>
            <p class="text-muted" style="font-size: 0.75rem; margin-top: 0.25rem;">Select from list or type a new one.</p>
          </div>

          <div class="form-group">
            <label class="form-label">Price Per Night ($)</label>
            <input type="number" id="pricePerNight" step="0.01" min="0" required class="form-input" placeholder="0.00">
          </div>

          <div id="form-msg" class="alert hidden"></div>

          <button type="submit" class="btn btn-primary" style="width: 100%;">
            <span class="material-symbols-outlined">save</span> Save Room
          </button>
        </form>
      </div>
    </div>

    <!-- Room List Table -->
    <div>
      <div class="card" style="padding: 0; overflow: hidden;">
        <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background-color: var(--bg-light);">
          <h3 style="display: flex; align-items: center; gap: 0.5rem;">
            <span class="material-symbols-outlined" style="color: var(--secondary);">format_list_bulleted</span> All Rooms
          </h3>
          <button onclick="loadRooms()" class="btn btn-secondary" style="background: transparent; color: var(--text-muted); box-shadow: none; padding: 0.5rem;">
            <span class="material-symbols-outlined">refresh</span> Refresh
          </button>
        </div>

        <div class="table-container" style="border: none; box-shadow: none;">
          <table class="table">
            <thead>
            <tr>
              <th>Room No.</th>
              <th>Type</th>
              <th>Price/Night</th>
              <th>Status</th>
            </tr>
            </thead>
            <tbody id="rooms-table-body">
            <tr><td colspan="4" class="text-center text-muted" style="padding: 2rem;">Loading rooms...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="js/manage-rooms.js"></script>
</body>
</html>
