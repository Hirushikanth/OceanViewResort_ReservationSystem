<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Ocean View Resort</title>

    <!-- Link Global CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Page Specific Styles -->
    <style>
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .user-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .welcome-text {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        /* Filter Dropdown Style */
        .filter-select {
            padding: 0.5rem 2rem 0.5rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-weight: 700;
            color: var(--text-dark);
            background-color: white;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .dashboard-header, .action-bar {
                flex-direction: column;
                align-items: flex-start;
            }
            .user-controls {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-content">
        <div class="logo-group" onclick="window.location.href='index.html'">
            <div class="logo-icon">
                <span class="material-symbols-outlined">water_lux</span>
            </div>
            <h2>Ocean View Resort</h2>
        </div>

        <div class="user-controls">
            <a href="help.html" style="display: flex; align-items: center; gap: 0.25rem; font-size: 0.875rem; font-weight: 700; color: var(--text-muted);">
                <span class="material-symbols-outlined" style="font-size: 1.25rem;">help</span> Help
            </a>
            <span id="welcomeMsg" class="welcome-text hidden">Welcome</span>
            <button id="logoutBtn" style="background: none; border: none; color: var(--error); font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 0.25rem; font-size: 0.875rem;">
                <span class="material-symbols-outlined" style="font-size: 1.25rem;">logout</span> Logout
            </button>
        </div>
    </div>
</header>

<!-- Main Content -->
<div class="container">

    <!-- Action Bar -->
    <div class="action-bar">
        <div>
            <h2>My Dashboard</h2>
            <p class="text-muted text-sm">Manage your reservations and view history.</p>
        </div>

        <!-- Customer Actions -->
        <div id="customer-actions" class="hidden">
            <a href="book.html" class="btn btn-primary">
                <span class="material-symbols-outlined">add</span> New Reservation
            </a>
        </div>

        <!-- Staff Actions -->
        <div id="staff-actions" class="hidden" style="display: flex; gap: 1rem; align-items: center;">
            <div>
                <select id="statusFilter" class="filter-select">
                    <option value="PENDING">Pending Requests</option>
                    <option value="ALL">All History</option>
                </select>
            </div>
            <!-- Admin Buttons injected by JS will appear here -->
        </div>
    </div>

    <!-- Table Container -->
    <div class="table-container">
        <table class="table">
            <thead>
            <tr>
                <th>Ref #</th>
                <th>Room Type</th>
                <th>Dates</th>
                <th>Guest</th>
                <th>Status</th>
                <th class="text-right">Action</th>
            </tr>
            </thead>
            <tbody id="bookings-table-body">
            <tr>
                <td colspan="6" class="text-center text-muted" style="padding: 2rem;">Loading reservations...</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
